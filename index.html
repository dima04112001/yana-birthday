function getCountdown() {
  const now = new Date();
  const diff = BIRTHDAY_NEXT - now;
  if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0 };
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  return { days, hours, minutes, seconds };
}

function Typewriter({ text, speed = 50 }) {
  const [displayedText, setDisplayedText] = useState("");
  const [cursor, setCursor] = useState(true);
  useEffect(() => {
    let index = 0;
    setDisplayedText("");
    const timer = setInterval(() => {
      if (index < text.length) {
        setDisplayedText(text.slice(0, index + 1));
        index++;
      } else { clearInterval(timer); }
    }, speed);
    return () => clearInterval(timer);
  }, [text, speed]);

    const cursorTimer = setInterval(() => setCursor(c => !c), 500);
    return () => clearInterval(cursorTimer);
  }, []);

  );
}

    return () => clearInterval(t);
  }, []);
  const pad = n => String(n).padStart(2, '0');
  return (
    <div className="countdown-box">
      <p className="countdown-title">До следующего дня рождения 🎂 (09.07.2027)</p>
      <div className="countdown-units">
        {[
          { num: time.days, label: "дней" },
          { num: pad(time.hours), label: "часов" },
          { num: pad(time.minutes), label: "минут" },
          { num: pad(time.seconds), label: "секунд" },
        ].map(({ num, label }) => (
          <div key={label} className="countdown-unit">
            <div className="countdown-num">{num}</div>
            <div className="countdown-label">{label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Cake() {
  const [blown, setBlown] = useState([false, false, false, false, false]);
  const allBlown = blown.every(Boolean);
  const blowCandle = (i) => {
    if (blown[i]) return;
    const next = [...blown];
    next[i] = true;
    setBlown(next);
  };
  return (
    <div style={{ textAlign: 'center', margin: '8px 0' }}>
      <div className="candles-row" style={{ marginBottom: 4 }}>
        {blown.map((b, i) => (
          <div key={i} className={`candle-wrap ${b ? 'blown' : ''}`} onClick={() => blowCandle(i)} title="Задуй свечу!">
            <span className="flame">🔥</span>
            <span className="smoke">💨</span>
            <span className="candle-body">🕯️</span>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 72, lineHeight: 1 }}>🎂</div>
      {!allBlown && <p className="candles-hint">Нажми на каждую свечку, чтобы задуть 🌬️</p>}
      {allBlown && (
        <p className="all-blown-msg">🎉 Все свечи задуты! Загадай желание! ✨</p>
      )}
    </div>
  );
}

function FireworkLayer({ active }) {
  const [particles, setParticles] = useState([]);
  useEffect(() => {
    if (!active) return;
    let count = 0;
    const interval = setInterval(() => {
      if (count >= 8) { clearInterval(interval); return; }
      count++;
      const batch = Array.from({ length: 12 }, (_, i) => ({
        id: Date.now() + i + Math.random(),
        x: 10 + Math.random() * 80,
        y: 10 + Math.random() * 70,
        emoji: FIREWORK_EMOJIS[Math.floor(Math.random() * FIREWORK_EMOJIS.length)],
        tx: (Math.random() - 0.5) * 120,
        ty: (Math.random() - 0.5) * 120,
        tx2: (Math.random() - 0.5) * 200,
        ty2: -60 - Math.random() * 100,
      }));
      setParticles(p => [...p, ...batch]);
      setTimeout(() => setParticles(p => p.filter(x => !batch.find(b => b.id === x.id))), 1400);
    }, 300);
    return () => clearInterval(interval);
  }, [active]);
  return (
    <>
      {particles.map(p => (
        <div
          key={p.id}
          className="firework-particle"
          style={{
            left: `${p.x}%`,
            top: `${p.y}%`,
            '--tx': `${p.tx}px`,
            '--ty': `${p.ty}px`,
            '--tx2': `${p.tx2}px`,
            '--ty2': `${p.ty2}px`,
          }}
        >
          {p.emoji}
        </div>
      ))}
    </>
  );
}

function App() {
  const [page, setPage] = useState(0);
  const [envelopeOpen, setEnvelopeOpen] = useState(false);
  const [showText, setShowText] = useState(false);
  const [showCompliments, setShowCompliments] = useState([false, false, false]);
  const [photoIndex, setPhotoIndex] = useState(0);
  const [petals, setPetals] = useState([]);
  const [musicPlaying, setMusicPlaying] = useState(false);
  const [compliments] = useState(getRandomCompliments());
  const [spinning, setSpinning] = useState(false);
  const [prediction, setPrediction] = useState(null);
  const [rotation, setRotation] = useState(0);
  const [garden, setGarden] = useState(Array(6).fill(null));
  const [harvestCount, setHarvestCount] = useState(0);
  const [gardenComplete, setGardenComplete] = useState(false);
  const [fireworkActive, setFireworkActive] = useState(false);
  const audioRef = useRef(null);

  useEffect(() => {
    audioRef.current = new Audio("music.mp3");
    audioRef.current.loop = true;
    audioRef.current.volume = 0.4;
  }, []);

  // Launch fireworks when reaching last page
  useEffect(() => {
    if (page === 5) {
      setFireworkActive(false);
      setTimeout(() => setFireworkActive(true), 300);
    }
  }, [page]);

  useEffect(() => {
    const interval = setInterval(() => {
      if (petals.length < 20) {
        const newPetal = {
          id: Date.now(),
          x: Math.random() * 90 + "%",
          y: Math.random() * 80 + "%",
          char: PETALS[Math.floor(Math.random() * PETALS.length)],
        };
        setPetals(p => [...p, newPetal]);
        setTimeout(() => setPetals(p => p.filter(x => x.id !== newPetal.id)), 4000);
      }
    }, 600);
    return () => clearInterval(interval);
  }, [petals.length]);

  useEffect(() => {
    if (page === 1 && showText) {
      const timers = [
        setTimeout(() => setShowCompliments([true, false, false]), 500),
        setTimeout(() => setShowCompliments([true, true, false]), 1500),
        setTimeout(() => setShowCompliments([true, true, true]), 2500),
      ];
      return () => timers.forEach(t => clearTimeout(t));
    }
  }, [page, showText]);

  function handleEnvelopeClick() {
    if (audioRef.current) {
      audioRef.current.play().catch(() => {});
      setMusicPlaying(true);
    }
    setEnvelopeOpen(true);
    setTimeout(() => setPage(1), 900);
    setTimeout(() => setShowText(true), 1200);
  }

  function toggleMusic() {
    if (!audioRef.current) return;
    if (musicPlaying) {
      audioRef.current.pause();
      setMusicPlaying(false);
    } else {
      audioRef.current.play().catch(() => {});
      setMusicPlaying(true);
    }
  }

  function spinWheel() {
    if (spinning) return;
    setSpinning(true);
    setPrediction(null);
    const spins = 5 + Math.floor(Math.random() * 5);
    const extraDegrees = Math.floor(Math.random() * 360);
    const totalRotation = rotation + spins * 360 + extraDegrees;
    setRotation(totalRotation);
    setTimeout(() => {
      const random = PREDICTIONS[Math.floor(Math.random() * PREDICTIONS.length)];
      setPrediction(random);
      setSpinning(false);
    }, 3000);
  }

  function plantVegetable(index) {
    if (garden[index] !== null || gardenComplete) return;
    const newGarden = [...garden];
    const randomVeg = VEGETABLES[Math.floor(Math.random() * VEGETABLES.length)];
    newGarden[index] = randomVeg;
    setGarden(newGarden);
    const newCount = harvestCount + 1;
    setHarvestCount(newCount);
    if (newCount >= 6) setGardenComplete(true);
  }

  function handleFinish() {
    window.location.reload();
  }

  return (
    <div className="container">
      {petals.map(p => (
        <div key={p.id} className="petal" style={{ left: p.x, top: p.y }}>{p.char}</div>
      ))}
      <FireworkLayer active={fireworkActive} />
      <button className={`music-btn ${musicPlaying ? 'playing' : ''}`} onClick={toggleMusic}>
        {musicPlaying ? '🔊' : '🔈'}
      </button>

      {/* СТРАНИЦА 0 — Конверт */}
      {page === 0 && (
        <div className="card" style={{ background: 'transparent', boxShadow: 'none' }}>
          <div className={`envelope-container ${envelopeOpen ? 'opening' : ''}`} onClick={handleEnvelopeClick}>
            💌
          </div>
          <p style={{ color: '#8b5e3c', fontStyle: 'italic', marginTop: 16, fontSize: 18 }}>
            Открой меня
          </p>
        </div>
      )}

      {/* СТРАНИЦА 1 — Поздравление */}
      {page === 1 && (
        <div className="card">
          <h1 style={{ fontSize: 32, marginBottom: 12 }}>
            Яна, с днём рождения! 🎂
          </h1>
          <Typewriter
            text="Пусть этот день будет таким же тёплым и светлым, как ты сама. Желаю тебе счастья, удачи и только хороших людей вокруг."
            speed={40}
          />
          {showText && (
            <>
              {showCompliments[0] && <p className="compliment">{compliments[0]}</p>}
              {showCompliments[1] && <p className="compliment">{compliments[1]}</p>}
              {showCompliments[2] && <p className="compliment">{compliments[2]}</p>}
            </>
          )}
          <div className="nav-buttons">
            <button className="nav-btn" onClick={() => { setPage(2); setShowCompliments([true, true, true]); }}>Дальше →</button>
          </div>
        </div>
      )}

      {/* СТРАНИЦА 2 — Галерея фото */}
      {page === 2 && (
        <div className="card">
          <h2 style={{ fontSize: 26, marginBottom: 16 }}>Как прошёл этот год</h2>
          <div className="photo-card">
            <img src={PHOTOS[photoIndex].src} alt="Фото" />
            <p className="photo-caption">{PHOTOS[photoIndex].caption}</p>
          </div>
          <div style={{ display: "flex", gap: 20, justifyContent: "center", marginTop: 16 }}>
            <button className="nav-btn" onClick={() => setPhotoIndex(Math.max(0, photoIndex - 1))} disabled={photoIndex === 0}>←</button>
            <span style={{ color: '#8b5e3c', padding: '8px 0' }}>{photoIndex + 1} / {PHOTOS.length}</span>
            <button className="nav-btn" onClick={() => setPhotoIndex(Math.min(PHOTOS.length - 1, photoIndex + 1))} disabled={photoIndex === PHOTOS.length - 1}>→</button>
          </div>
          <div className="nav-buttons">
            <button className="nav-btn" onClick={() => setPage(1)}>← Назад</button>
            <button className="nav-btn" onClick={() => setPage(3)}>Дальше →</button>
          </div>
        </div>
      )}

      {/* СТРАНИЦА 3 — Колесо предсказаний */}
      {page === 3 && (
        <div className="card">
          <h2 style={{ fontSize: 26, marginBottom: 8 }}>Колесо предсказаний 🔮</h2>
          <p className="subtitle" style={{ marginBottom: 24 }}>
            Вселенная знает, что тебя ждёт...
          </p>
          <div
            className="wheel"
            onClick={spinWheel}
            style={{ cursor: spinning ? "default" : "pointer", transform: `rotate(${rotation}deg)` }}
          >
            {["⭐", "🌟", "💫", "✨", "🔮", "🪐", "🌙", "☀️"].map((emoji, i) => (
              <span key={i} className="wheel-emoji" style={{ transform: `rotate(${i * 45}deg) translateY(-75px)` }}>
                {emoji}
              </span>
            ))}
            <div className="wheel-center">🔮</div>
          </div>
          <p style={{ color: "#8b5e3c", fontSize: 14, marginBottom: 8 }}>
            {spinning ? "Вселенная думает..." : "Нажми на колесо, чтобы узнать судьбу"}
          </p>
          {prediction && !spinning && (
            <div className="prediction-box">
              <p style={{ fontSize: 16, color: "#6b3a2a", fontStyle: "italic", lineHeight: 1.5 }}>
                ✨ {prediction} ✨
              </p>
            </div>
          )}
          {prediction && !spinning && (
            <button className="nav-btn" onClick={spinWheel} style={{ marginTop: 16, fontSize: 16, padding: '10px 24px' }}>
              🔄 Крутить ещё раз
            </button>
          )}
          <div className="nav-buttons">
            <button className="nav-btn" onClick={() => setPage(2)}>← Назад</button>
            <button className="nav-btn" onClick={() => setPage(4)}>Дальше →</button>
          </div>
        </div>
      )}

      {/* СТРАНИЦА 4 — Мини-огород */}
      {page === 4 && (
        <div className="card">
          <h2 style={{ fontSize: 26, marginBottom: 8 }}>Посади свой урожай 🌱</h2>
          <p className="subtitle" style={{ marginBottom: 24 }}>
            Яна, посади овощи и собери урожай!
          </p>
          <div className="garden-bed">
            {garden.map((veg, i) => (
              <div key={i} className={`garden-plot ${veg ? 'planted' : ''}`} onClick={() => plantVegetable(i)}>
                {veg ? <span className="garden-veg">{veg}</span> : "🟫"}
              </div>
            ))}
          </div>
          <p className="harvest-counter">
            {gardenComplete
              ? "🏆 Урожай собран! Ты настоящий агроном!"
              : `Собрано: ${harvestCount}/6 🌾`}
          </p>
          {gardenComplete && (
            <div className="prediction-box" style={{ marginTop: 16 }}>
              <p style={{ fontSize: 16, color: "#6b3a2a", fontStyle: "italic", lineHeight: 1.5 }}>
                Даже в день рождения ты думаешь об урожае! 😄<br/>
                С таким агрономом никакой голод не страшен! 🌱🏆
              </p>
            </div>
          )}
          <div className="nav-buttons">
            <button className="nav-btn" onClick={() => setPage(3)}>← Назад</button>
            <button className="nav-btn" onClick={() => setPage(5)}>Дальше →</button>
          </div>
        </div>
      )}

      {/* СТРАНИЦА 5 — Подарок + торт + отсчёт */}
      {page === 5 && (
        <div className="card">
          <h2 style={{ fontSize: 28, marginBottom: 8 }}>Твой подарок 🎁</h2>

          {/* Торт со свечами */}
          <Cake />

          {/* Сертификат */}
          <div style={{
            background: "white",
            borderRadius: 16,
            padding: 20,
            boxShadow: "0 8px 24px rgba(0,0,0,0.1)",
            marginBottom: 12,
            marginTop: 16,
          }}>
            <img
              src="certificate.png"
              alt="Сертификат Золотое Яблоко"
              style={{ width: "100%", borderRadius: 8 }}
            />
          </div>
          <p style={{ color: '#b85c38', fontSize: 15, fontStyle: 'italic', lineHeight: 1.5, marginBottom: 12 }}>
            Сертификат уже отправился на твой телефон 📱<br/>
            <span style={{ fontSize: 13, color: '#8b5e3c' }}>Проверь СМС от Золотого Яблока</span>
          </p>

          {/* Обратный отсчёт */}
          <Countdown />

          {/* Кнопки */}
          <div className="nav-buttons" style={{ marginTop: 16, flexWrap: 'wrap' }}>
            <button className="nav-btn" onClick={() => setPage(4)}>← Назад</button>
            <button className="finish-btn" onClick={handleFinish}>🎀 Завершить</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</body>
